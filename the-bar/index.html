<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <title>The Bar</title>
  <meta name="description" content="A personal cocktail catalog. Track your shelf, find what you can pour." />

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0c0907" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="The Bar" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="root">
    <div class="boot-loader">
      <div class="boot-glass">◆</div>
      <div class="boot-label">THE BAR</div>
    </div>
  </div>

  <!-- React + Babel via CDN; cached by SW after first load -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="./app.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) =>
          console.warn('SW registration failed:', err)
        );
      });
    }
  </script>
</body>
</html>
